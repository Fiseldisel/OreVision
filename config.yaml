# ============================================================
# OreVision — конфигурация продукта
# Автоматическая классификация руд по OM-изображениям шлифов
# ============================================================

data:
  # Корень датасета (можно поменять при переносе на другую машину)
  root: "C:/Users/user/Documents/my_project/data/Задача 3. Скажи мне, кто твой шлиф"
  # Источники: папка -> класс -> часть съёмки (домен)
  sources:
    - { dir: "Фото руд по сортам. ч1/Оталькованные руды",    class: talc,     part: ch1 }
    - { dir: "Фото руд по сортам. ч1/Рядовые руды",          class: ordinary, part: ch1 }
    - { dir: "Фото руд по сортам. ч1/Труднообогатимые руды", class: hard,     part: ch1 }
    - { dir: "Фото руд по сортам. ч2/оталькованные",         class: talc,     part: ch2 }
    - { dir: "Фото руд по сортам. ч2/рядовые",               class: ordinary, part: ch2 }
    - { dir: "Фото руд по сортам. ч2/тонкие",                class: hard,     part: ch2 }
  manifest: "data/manifest.csv"     # относительно корня проекта
  cache_dir: "data/cache"           # уменьшенные копии для быстрого обучения
  cache_max_side: 1536              # макс. сторона кэшированного изображения
  val_fraction: 0.2
  seed: 42

classes:
  # Порядок = индексы классов модели
  order: [ordinary, hard, talc]
  display:
    ordinary: "Рядовая руда"
    hard:     "Труднообогатимая руда"
    talc:     "Оталькованная руда"
  # Цвета оверлея (RGB), по ТЗ: зелёный=обычные срастания, красный=тонкие, синий=тальк
  colors:
    ordinary: [46, 204, 64]
    hard:     [255, 65, 54]
    talc:     [0, 116, 217]

train:
  arch: efficientnet_v2_s   # torchvision, transfer learning с ImageNet
  img_size: 384
  batch_size: 32
  epochs: 40
  lr: 1.0e-4
  weight_decay: 1.0e-4
  label_smoothing: 0.05
  num_workers: 6
  amp: true                 # mixed precision
  patience: 10              # ранняя остановка по val macro-F1
  balance_sampler: true     # балансировка классов сэмплером
  out_dir: "models"

infer:
  img_size: 384
  # Фото: сетка перекрывающихся кропов, усреднение вероятностей
  photo_max_side: 1536      # масштаб анализа обычного фото (согласован с обучением)
  # Панорамы: тайловый анализ в нативном разрешении
  panorama_min_pixels: 30000000   # изображение крупнее 30 Мпикс считается панорамой
  tile: 1024                # размер тайла, пикс (нативное разрешение панорамы)
  overlap: 0                # перекрытие тайлов, пикс
  batch_size: 32
  # Фильтр фона: почти однотонные тёмные тайлы (край шлифа, эпоксидка) исключаются
  background_std: 5.0
  background_mean: 22.0
  # Экспертное правило (ТЗ): доля площади талька > 10% -> оталькованная руда,
  # иначе преобладание обычных/тонких срастаний
  talc_threshold: 0.10

report:
  out_dir: "results"
